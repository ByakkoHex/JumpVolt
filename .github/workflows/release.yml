name: Build & Release

# Uruchamia się gdy wypchniesz tag w formacie: v0.2.0, v1.0.0 itp.
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout kodu
        uses: actions/checkout@v4

      - name: Konfiguracja .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # "v0.2.0" → "0.2.0"
      - name: Wyciągnij wersję z taga
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # Podmienia <Version> w .csproj żeby aplikacja zgłaszała właściwą wersję
      - name: Zaktualizuj wersję w .csproj
        shell: pwsh
        run: |
          $v = "${{ steps.version.outputs.VERSION }}"
          $f = "SklepMotoryzacyjny/SklepMotoryzacyjny.csproj"
          (Get-Content $f) -replace '<Version>.*?</Version>', "<Version>$v</Version>" |
            Set-Content $f
          Write-Host "Wersja: $v"

      - name: Opublikuj aplikację (single-file exe)
        shell: pwsh
        run: |
          dotnet publish SklepMotoryzacyjny/SklepMotoryzacyjny.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true `
            -o ./publish

      - name: Zainstaluj Inno Setup
        run: choco install innosetup --no-progress -y

      # Kompiluje installer.iss i przekazuje wersję jako define
      - name: Skompiluj installer
        shell: pwsh
        run: |
          $v = "${{ steps.version.outputs.VERSION }}"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=$v installer.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Utwórz GitHub Release i wgraj installer
        uses: softprops/action-gh-release@v2
        with:
          name: "JumpVolt v${{ steps.version.outputs.VERSION }}"
          files: "installer_output/JumpVolt_Setup_${{ steps.version.outputs.VERSION }}.exe"
          generate_release_notes: true
